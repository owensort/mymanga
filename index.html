<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mymanga</title>
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xpressengine/xeicon@2.3.3/xeicon.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        i { font-family: 'xeicon' !important; }
        body { background-color: #fff; font-family: 'PT Sans', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        #capture-area {
            background: #fff; padding: 8vw 5vw 180px 5vw; width: 100%; max-width: 900px;
            display: flex; flex-direction: column; align-items: center;
        }

        .user-id-wrapper { margin-bottom: 4vw; display: flex; justify-content: center; align-items: center; gap: 4px; width: 100%; }
        .user-id-prefix, .user-id-edit { font-weight: bold; font-size: clamp(16px, 8vw, 3em); color: #000; line-height: 1.1; }

        .editable-div { outline: none; background: transparent; font-weight: bold; text-align: left; display: inline-block; min-width: 10px; word-break: break-all; white-space: pre-wrap; }
        [contenteditable="true"]:empty:before { content: attr(placeholder); color: #ccc; }

        .grid-board { display: flex; flex-wrap: wrap; width: 100%; column-gap: 1vw; row-gap: 2vw; justify-content: center; }
        .card-unit { width: calc((100% - 2vw) / 3); display: flex; flex-direction: column; gap: 1vw; }

        .image-container { 
            width: 100%; aspect-ratio: 3 / 4; position: relative; background-color: #f9f9f9; 
            display: flex; justify-content: center; align-items: center; 
            border: clamp(1px, 0.5vw, 2px) solid #000; overflow: hidden; 
        }

        .info-area { display: flex; flex-direction: column; gap: 0.3vw; width: 100%; }
        .title-edit { font-size: clamp(10px, 6vw, 14px); color: #000; }
        .author-edit { font-size: clamp(8px, 4vw, 11px); color: #666; }

        .preview-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; display: none; }
        .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 3; }
        .xi-plus-circle { font-size: 24px; color: #000; }

        .controls { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .btn-save { width: 60px; height: 60px; font-size: 28px; background: #000; color: #fff; border: none; border-radius: 50%; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="user-id-wrapper">
        <span class="user-id-prefix">@</span>
        <div id="user-id" class="editable-div user-id-edit" contenteditable="true" placeholder="username"></div>
    </div>
    <div class="grid-board" id="gridBoard"></div>
</div>

<div class="controls">
    <button class="btn-save" onclick="saveImage()"><i class="xi-download"></i></button>
</div>

<script>
    // 텍스트 로드/저장
    function saveText(id, val) { localStorage.setItem(id, val); }
    function loadText(id) { 
        const v = localStorage.getItem(id); 
        if(v) document.getElementById(id).innerText = v; 
    }

    // 그리드 생성
    const grid = document.getElementById('gridBoard');
    for (let i = 1; i <= 9; i++) {
        const unit = document.createElement('div');
        unit.className = 'card-unit';
        unit.innerHTML = `
            <div class="image-container">
                <i class="xi-plus-circle"></i>
                <img id="img-${i}" class="preview-img">
                <input type="file" class="file-input" accept="image/*" onchange="handleImg(this, ${i})">
            </div>
            <div class="info-area">
                <div id="t-${i}" class="editable-div title-edit" contenteditable="true" placeholder="TITLE" oninput="saveText('t-${i}', this.innerText)"></div>
                <div id="a-${i}" class="editable-div author-edit" contenteditable="true" placeholder="AUTHOR" oninput="saveText('a-${i}', this.innerText)"></div>
            </div>
        `;
        grid.appendChild(unit);
        loadText(`t-${i}`); loadText(`a-${i}`);
        const savedImg = localStorage.getItem(`img-${i}`);
        if(savedImg) { 
            const img = document.getElementById(`img-${i}`);
            img.src = savedImg; img.style.display = 'block'; 
        }
    }
    loadText('user-id');
    document.getElementById('user-id').addEventListener('input', (e) => saveText('user-id', e.target.innerText));

    function handleImg(input, idx) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById(`img-${idx}`);
                img.src = e.target.result; 
                img.style.display = 'block';
                try { localStorage.setItem(`img-${idx}`, e.target.result); } catch(e) { console.warn("Quota Exceeded"); }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function saveImage() {
        const target = document.getElementById('capture-area');
        const exportWidth = 1080;
        const sidePad = exportWidth * 0.1;

        // 캡처용 가상 컨테이너
        const wrapper = document.createElement('div');
        Object.assign(wrapper.style, {
            position: 'absolute', top: '-9999px', left: '0', width: exportWidth + 'px',
            backgroundColor: '#ffffff', display: 'flex', justifyContent: 'center'
        });

        const clone = target.cloneNode(true);
        Object.assign(clone.style, {
            width: (exportWidth - (sidePad * 2)) + 'px',
            padding: '80px 0 120px 0', display: 'flex', flexDirection: 'column', alignItems: 'center'
        });

        wrapper.appendChild(clone);
        document.body.appendChild(wrapper);

        // 텍스트 데이터 동기화
        wrapper.querySelector('#user-id').innerText = document.getElementById('user-id').innerText;
        for(let i=1; i<=9; i++) {
            wrapper.querySelector(`#t-${i}`).innerText = document.getElementById(`t-${i}`).innerText;
            wrapper.querySelector(`#a-${i}`).innerText = document.getElementById(`a-${i}`).innerText;
        }

        try {
            const canvas = await html2canvas(wrapper, {
                scale: 1, useCORS: true, logging: false, width: exportWidth, windowWidth: exportWidth
            });

            // [수정] DataURL 대신 Blob 사용 (파일 깨짐 방지)
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `mymanga_${Date.now()}.png`;
                link.click();
                URL.revokeObjectURL(url); // 메모리 해제
            }, 'image/png');

        } catch (err) {
            alert("이미지 생성 중 오류 발생");
        } finally {
            document.body.removeChild(wrapper);
        }
    }
</script>
</body>
</html>
