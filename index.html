<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mymanga</title>
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xpressengine/xeicon@2.3.3/xeicon.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        i { font-family: 'xeicon' !important; }

        body { 
            background-color: #fff; font-family: 'PT Sans', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        #capture-area {
            background: #fff;
            padding: 50px 100px 100px 100px; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 700px;
        }

        .user-id-wrapper { 
            margin-bottom: 40px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 2px;
            width: 100%;
        }

        .user-id-prefix { 
            font-weight: bold; 
            font-size: 28px; 
            color: #000;
            line-height: 1.2;
        }

        .editable-div {
            outline: none;
            background: transparent;
            font-weight: bold;
            text-align: left;
            display: inline-block;
            min-width: 10px;
            line-height: 1.3;
            word-break: break-all; /* 단어가 길어도 줄바꿈 */
            white-space: pre-wrap; /* 공백 및 줄바꿈 유지 */
        }

        .user-id-edit { font-size: 28px; color: #000; }

        [contenteditable="true"]:empty:before {
            content: attr(placeholder);
            color: #ccc;
            display: block;
        }

        .grid-board { 
            display: flex; 
            flex-wrap: wrap; 
            width: 100%; 
            column-gap: 15px; 
            row-gap: 30px; /* 세로 간격을 조금 더 넉넉히 */
            justify-content: center;
            align-items: flex-start; /* 텍스트 길이에 따라 높이가 달라도 정렬 유지 */
        }

        .card-unit { 
            width: calc((100% - (15px * 2)) / 3);
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            min-width: 0;
        }

        .image-container { 
            width: 100%; 
            aspect-ratio: 3 / 4; 
            position: relative; 
            background-color: #f9f9f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border: 2px solid #000; 
            overflow: hidden; 
        }

        /* 제목 영역이 길어지면 자동으로 아래로 밀림 */
        .info-area {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }

        .title-edit { font-size: 18px; color: #000; width: 100%; }
        .author-edit { font-size: 13px; color: #666; width: 100%; }

        @media (min-width: 681px) { .image-container { border-width: 4px; } }
        
        @media (max-width: 680px) {
            #capture-area { padding: 30px 10px 80px 10px; }
            .grid-board { column-gap: 8px; row-gap: 20px; }
            .card-unit { width: calc((100% - (8px * 2)) / 3); }
            .user-id-prefix, .user-id-edit { font-size: 22px; }
            .title-edit { font-size: 14px; }
            .author-edit { font-size: 11px; }
        }
        
        .xi-plus-circle { font-size: 40px; color: #000; }
        .preview-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; display: none; }
        .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 3; }

        .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .btn-save { width: 65px; height: 65px; font-size: 30px; background: #000; color: #fff; border: none; border-radius: 50%; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="user-id-wrapper">
        <span class="user-id-prefix">@</span>
        <div id="user-id" class="editable-div user-id-edit" contenteditable="true" placeholder="username" oninput="saveTextData('user-id', this.innerText)"></div>
    </div>
    <div class="grid-board" id="gridBoard"></div>
</div>

<div class="controls">
    <button class="btn-save" onclick="saveImage()">
        <i class="xi-download"></i>
    </button>
</div>

<script>
    const grid = document.getElementById('gridBoard');

    // 텍스트 데이터 저장 함수
    function saveTextData(key, value) {
        localStorage.setItem(key, value);
    }

    // 초기 로드 시 텍스트 복원
    function loadTextData(id) {
        const saved = localStorage.getItem(id);
        if (saved) {
            document.getElementById(id).innerText = saved;
        }
    }

    // 9개 카드 생성 및 데이터 로드
    for (let i = 1; i <= 9; i++) {
        const unit = document.createElement('div');
        unit.className = 'card-unit';
        unit.innerHTML = `
            <div class="image-container">
                <i class="xi-plus-circle"></i>
                <img id="img-${i}" class="preview-img">
                <input type="file" class="file-input" accept="image/*" onchange="handleImageUpload(this, ${i})">
            </div>
            <div class="info-area">
                <div id="title-${i}" class="editable-div title-edit" contenteditable="true" placeholder="TITLE" oninput="saveTextData('title-${i}', this.innerText)"></div>
                <div id="author-${i}" class="editable-div author-edit" contenteditable="true" placeholder="AUTHOR" oninput="saveTextData('author-${i}', this.innerText)"></div>
            </div>
        `;
        grid.appendChild(unit);

        // 데이터 복원
        loadTextData(`title-${i}`);
        loadTextData(`author-${i}`);
        const savedImg = localStorage.getItem(`img-${i}`);
        if (savedImg) {
            const imgTag = document.getElementById(`img-${i}`);
            imgTag.src = savedImg;
            imgTag.style.display = 'block';
        }
    }
    loadTextData('user-id');

    function handleImageUpload(input, idx) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById(`img-${idx}`);
                img.src = e.target.result; 
                img.style.display = 'block';
                try {
                    localStorage.setItem(`img-${idx}`, e.target.result);
                } catch (err) {
                    console.warn("image capacity is too large to be saved.");
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function saveImage() {
        const target = document.getElementById('capture-area');
        document.activeElement.blur();
        const currentScroll = window.scrollY;
        window.scrollTo(0, 0);

        try {
            const canvas = await html2canvas(target, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff',
                logging: false,
                width: target.offsetWidth,
                height: target.offsetHeight
            });

            const link = document.createElement('a');
            link.download = `mymanga_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch (err) {
            alert("save failed!");
        } finally {
            window.scrollTo(0, currentScroll);
        }
    }
</script>
</body>
</html>
