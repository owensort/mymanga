<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mymanga</title>
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xpressengine/xeicon@2.3.3/xeicon.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        i { font-family: 'xeicon' !important; }

        body { 
            background-color: #fff; 
            font-family: 'PT Sans', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            -webkit-font-smoothing: antialiased;
            letter-spacing:-1px;
        }

        /* [반응형 수정] 고정 너비를 제거하고 %와 max-width 사용 */
        #capture-area {
            background: #fff;
            padding: 8vw 5vw 8vw 5vw; 
            width: 100%;
            max-width: 900px; /* PC에서도 너무 퍼지지 않게 제한 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .user-id-wrapper { 
            margin-bottom: 6vw; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 2px;
            width: 100%;
        }

        .user-id-prefix { font-weight: bold; font-size: clamp(20px, 5vw, 32px); color: #000; line-height: 1.2; }
        .user-id-edit { font-size: clamp(20px, 5vw, 32px); color: #000; }

        .editable-div {
            outline: none;
            background: transparent;
            font-weight: bold;
            text-align: left;
            display: inline-block;
            min-width: 10px;
            line-height: 1.3;
            word-break: break-all;
            white-space: pre-wrap;
        }

        [contenteditable="true"]:empty:before {
            content: attr(placeholder);
            color: #ccc;
            display: block;
        }

        /* 그리드 간격도 반응형으로 조절 */
        .grid-board { 
            display: flex; 
            flex-wrap: wrap; 
            width: 100%; 
            column-gap: 3%; 
            row-gap: 2vw;
            justify-content: center;
            align-items: flex-start;
        }

        .card-unit { 
            width: 31.33%; /* 3개 배치 (31.33*3 + 3*2 = 약 100) */
            display: flex; 
            flex-direction: column; 
            gap: 1vw; 
            min-width: 0;
        }

        .image-container { 
            width: 100%; 
            aspect-ratio: 3 / 4; 
            position: relative; 
            background-color: #f9f9f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border: clamp(1px, 0.5vw, 2px) solid #000; 
            overflow: hidden; 
        }

        .info-area { display: flex; flex-direction: column; width: 100%; }
        .title-edit { font-size: clamp(10px, 2.5vw, 14px); color: #000; width: 100%; }
        .author-edit { font-size: clamp(10px, 1.8vw, 14px); color: #666; width: 100%; }

        .xi-plus-circle { font-size: clamp(10px, 6vw, 14px); color: #000; }
        .preview-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; display: none; }
        .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 3; }

        .controls { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .btn-save { width: 65px; height: 65px; font-size: 30px; background: #000; color: #fff; border: none; border-radius: 50%; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="user-id-wrapper">
        <span class="user-id-prefix">@</span>
        <div id="user-id" class="editable-div user-id-edit" contenteditable="true" placeholder="username" oninput="saveTextData('user-id', this.innerText)"></div>
    </div>
    <div class="grid-board" id="gridBoard"></div>
</div>

<div class="controls">
    <button class="btn-save" onclick="saveImage()">
        <i class="xi-download"></i>
    </button>
</div>

<script>
    const grid = document.getElementById('gridBoard');

    function saveTextData(key, value) { localStorage.setItem(key, value); }
    function loadTextData(id) {
        const saved = localStorage.getItem(id);
        if (saved) document.getElementById(id).innerText = saved;
    }

    // 카드 생성 로직
    for (let i = 1; i <= 9; i++) {
        const unit = document.createElement('div');
        unit.className = 'card-unit';
        unit.innerHTML = `
            <div class="image-container">
                <i class="xi-plus-circle"></i>
                <img id="img-${i}" class="preview-img">
                <input type="file" class="file-input" accept="image/*" onchange="handleImageUpload(this, ${i})">
            </div>
            <div class="info-area">
                <div id="title-${i}" class="editable-div title-edit" contenteditable="true" placeholder="TITLE" oninput="saveTextData('title-${i}', this.innerText)"></div>
                <div id="author-${i}" class="editable-div author-edit" contenteditable="true" placeholder="AUTHOR" oninput="saveTextData('author-${i}', this.innerText)"></div>
            </div>
        `;
        grid.appendChild(unit);
        loadTextData(`title-${i}`);
        loadTextData(`author-${i}`);
        const savedImg = localStorage.getItem(`img-${i}`);
        if (savedImg) {
            const imgTag = document.getElementById(`img-${i}`);
            imgTag.src = savedImg;
            imgTag.style.display = 'block';
        }
    }
    loadTextData('user-id');

    function handleImageUpload(input, idx) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById(`img-${idx}`);
                img.src = e.target.result; 
                img.style.display = 'block';
                try { localStorage.setItem(`img-${idx}`, e.target.result); } catch (err) {}
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function saveImage() {
        const target = document.getElementById('capture-area');
        document.activeElement.blur();
        
        // 1. 캡처용 복제본 생성
        const clone = target.cloneNode(true);
        const originalWidth = target.offsetWidth;
        const sideMargin = originalWidth * 0.15; // 콘텐츠 너비의 15%를 여백으로 (좌우 총 30%)
        const captureWidth = originalWidth + (sideMargin * 2);

        clone.style.position = 'fixed';
        clone.style.left = '-9999px';
        clone.style.width = captureWidth + 'px';
        clone.style.paddingLeft = sideMargin + 'px';
        clone.style.paddingRight = sideMargin + 'px';
        clone.style.paddingBottom = '100px';
        clone.style.backgroundColor = '#ffffff';

        // 2. 텍스트 직접 복사 (Node 복제 시 innerText 유실 방지)
        clone.querySelector('#user-id').innerText = document.getElementById('user-id').innerText;
        for(let i=1; i<=9; i++) {
            clone.querySelector(`#title-${i}`).innerText = document.getElementById(`title-${i}`).innerText;
            clone.querySelector(`#author-${i}`).innerText = document.getElementById(`author-${i}`).innerText;
        }

        document.body.appendChild(clone);

        try {
            const canvas = await html2canvas(clone, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff',
                width: captureWidth,
                height: clone.offsetHeight,
                scrollY: -window.scrollY
            });

            const link = document.createElement('a');
            link.download = `mymanga_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch (err) {
            alert("이미지 저장 실패");
        } finally {
            document.body.removeChild(clone);
        }
    }
</script>
</body>
</html>
